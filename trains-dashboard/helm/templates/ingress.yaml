apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "trains-dashboard.fullname" . }}
  labels:
    {{- include "trains-dashboard.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "trains-dashboard.fullname" . }}-frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "trains-dashboard.fullname" . }}-backend
                port:
                  number: 8000
