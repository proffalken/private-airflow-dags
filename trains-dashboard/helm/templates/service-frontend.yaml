apiVersion: v1
kind: Service
metadata:
  name: {{ include "trains-dashboard.fullname" . }}-frontend
  labels:
    {{- include "trains-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "trains-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
