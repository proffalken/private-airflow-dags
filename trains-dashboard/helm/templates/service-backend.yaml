apiVersion: v1
kind: Service
metadata:
  name: {{ include "trains-dashboard.fullname" . }}-backend
  labels:
    {{- include "trains-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "trains-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
