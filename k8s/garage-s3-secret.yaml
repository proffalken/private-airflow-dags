# Garage S3 credentials for Airflow workers.
#
# Fill in ACCESS_KEY, SECRET_KEY, and GARAGE_IP from the output of
# setup/garage-setup.sh, then apply with:
#
#   kubectl apply -f k8s/garage-s3-secret.yaml
#
# The AIRFLOW_CONN_GARAGE_S3 env var is the Airflow URI connection format.
# Airflow automatically registers any AIRFLOW_CONN_* env var as a connection,
# so no manual entry in the Airflow UI is needed.
#
# IMPORTANT: never commit this file with real values — keep secrets out of git.
# Add k8s/garage-s3-secret.yaml to .gitignore or use a template/sealed-secrets
# workflow. The values below are placeholders only.
apiVersion: v1
kind: Secret
metadata:
  name: garage-s3-credentials
  namespace: airflow
type: Opaque
stringData:
  # Produced by: setup/garage-setup.sh
  # Replace <ACCESS_KEY>, <SECRET_KEY>, and <GARAGE_IP> with real values.
  AIRFLOW_CONN_GARAGE_S3: >-
    {"conn_type":"aws","login":"<ACCESS_KEY>","password":"<SECRET_KEY>",
    "extra":{"endpoint_url":"http://<GARAGE_IP>:3900","region_name":"garage"}}
