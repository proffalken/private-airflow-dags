# Helm values override for the Airflow release.
# Ensures OTEL_EXPORTER_OTLP_ENDPOINT is propagated to task worker subprocesses,
# which run in a separate PID from the main Airflow worker and do not automatically
# inherit all environment variables.
#
# Apply with:
#   helm upgrade airflow apache-airflow/airflow \
#     -n airflow --version 1.19.0 --reuse-values \
#     -f k8s/airflow-values-otel.yaml

env:
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://dash0-operator-opentelemetry-collector-service.dash0-system.svc.cluster.local:4318"

# Inject connections and variables into every component globally.
# In Airflow 3 the Task SDK routes Variable/Connection lookups through the
# API server, so all secrets must be present there — not just on the workers.
extraEnvFrom: |
  - secretRef:
      name: airflow-git-connection
  - secretRef:
      name: airflow-variables
  - secretRef:
      name: airflow-social-archive-db
  - secretRef:
      name: garage-s3-credentials

# Mount the SSH private key at a fixed path so GitHook can use key_file.
volumes:
  - name: git-ssh-key
    secret:
      secretName: airflow-git-ssh-key
      defaultMode: 0400

volumeMounts:
  - name: git-ssh-key
    mountPath: /opt/airflow/secrets/git-ssh
    readOnly: true

workers:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1536Mi"
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://dash0-operator-opentelemetry-collector-service.dash0-system.svc.cluster.local:4318"
    - name: AIRFLOW_CONN_GARAGE_S3
      valueFrom:
        secretKeyRef:
          name: garage-s3-credentials
          key: AIRFLOW_CONN_GARAGE_S3

triggerer:
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://dash0-operator-opentelemetry-collector-service.dash0-system.svc.cluster.local:4318"
