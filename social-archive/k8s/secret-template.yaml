# Secret template for social-archive — do NOT commit real values.
#
# Create the secret once with:
#
#   kubectl create secret generic social-archive-secrets \
#     --namespace default \
#     --from-literal=DATABASE_URL='postgresql+psycopg://app:<password>@ossway-pg-rw.default.svc.cluster.local:5432/social_archive' \
#     --from-literal=JWT_SECRET='<random-256-bit-string>' \
#     --from-literal=ADMIN_USERNAME='admin' \
#     --from-literal=ADMIN_PASSWORD='<strong-password>'
#
# Required keys:
#   DATABASE_URL    — psycopg3 connection URL for the social_archive database
#   JWT_SECRET      — random secret used to sign JWT tokens
#   ADMIN_USERNAME  — initial admin username (created on first boot if users table is empty)
#   ADMIN_PASSWORD  — initial admin password
