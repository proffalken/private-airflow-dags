name: Trains Dashboard

on:
  pull_request:
    paths:
      - 'trains-dashboard/**'
      - 'tests/test_trains_dashboard.py'
  push:
    branches:
      - main
    paths:
      - 'trains-dashboard/**'
      - 'tests/test_trains_dashboard.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/test_trains_dashboard.py -v

  build-backend:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: trains-dashboard/backend
          push: true
          tags: ghcr.io/${{ github.repository }}/trains-dashboard-backend:latest

  build-frontend:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: trains-dashboard/frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/trains-dashboard-frontend:latest
