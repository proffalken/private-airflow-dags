[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
    "pyarrow>=18.0",
    "stomp.py>=8.1",
    "boto3>=1.34",
    "opentelemetry-sdk>=1.28",
    "opentelemetry-exporter-otlp>=1.28",
]
